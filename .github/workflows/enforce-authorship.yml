name: Enforce Authorship

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  verify-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Verify Commit Authors
        run: |
          echo "Checking commit authors for unauthorized identities..."
          
          # Check author emails
          INVALID_COMMITS=$(git log origin/${{ github.base_ref }}..HEAD --format="%h - %an <%ae>" | grep -i -E "@anthropic\.com|@jurnx\.com|claude" || true)
          
          if [ -n "$INVALID_COMMITS" ]; then
            echo "::error::Found unauthorized commit authors! AI builders must use the authorized OpenTendril identity."
            echo "$INVALID_COMMITS"
            exit 1
          fi
          
          # Check Co-authored-by trailers in the commit body
          INVALID_TRAILERS=$(git log origin/${{ github.base_ref }}..HEAD --format="%h - %b" | grep -i -E "Co-authored-by:.*(@anthropic\.com|claude|jurnx)" || true)
          
          if [ -n "$INVALID_TRAILERS" ]; then
            echo "::error::Found unauthorized Co-authored-by trailers in commit messages!"
            echo "$INVALID_TRAILERS"
            exit 1
          fi
          
          echo "✅ All commit authors and trailers verified successfully."

      - name: Verify Commit Signatures
        env:
          GH_TOKEN: ${{ github.token }}
          # Report-only until this repo variable is set to 'true' (Settings →
          # Secrets and variables → Actions → Variables → REQUIRE_SIGNED_COMMITS).
          # That lets the check land before commit signing is rolled out; flip it
          # on once maintainers and Pollinators sign, alongside branch protection's
          # "Require signed commits" (which is the actual push-time gate on main).
          ENFORCE: ${{ vars.REQUIRE_SIGNED_COMMITS }}
        run: |
          echo "Checking commit signatures (GitHub verifies against uploaded keys server-side)..."

          unsigned=0
          for sha in $(git log origin/${{ github.base_ref }}..HEAD --format=%H); do
            status=$(gh api "repos/${{ github.repository }}/commits/$sha" \
              --jq '[.commit.verification.verified, .commit.verification.reason] | @tsv')
            verified=$(printf '%s' "$status" | cut -f1)
            reason=$(printf '%s' "$status" | cut -f2)
            subject=$(git log -1 --format='%h %s' "$sha")
            if [ "$verified" = "true" ]; then
              echo "  ✅ $subject — verified"
            else
              echo "  ⚠️  $subject — UNVERIFIED ($reason)"
              unsigned=$((unsigned + 1))
            fi
          done

          if [ "$unsigned" -gt 0 ]; then
            if [ "$ENFORCE" = "true" ]; then
              echo "::error::$unsigned commit(s) are not signed/verified and REQUIRE_SIGNED_COMMITS is enabled."
              exit 1
            fi
            echo "::warning::$unsigned commit(s) are not signed/verified. Report-only until REQUIRE_SIGNED_COMMITS=true."
          else
            echo "✅ All commits are signed and verified."
          fi
