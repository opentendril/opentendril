name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "**/*.md"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Path Filter
    runs-on: ubuntu-latest
    outputs:
      sprout-python: ${{ steps.filter.outputs['sprout-python'] }}
      stem-go: ${{ steps.filter.outputs['stem-go'] }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The filter decides whether the required gate runs anything at all, so
      # it is tested before it is trusted: a routing mistake fails this job
      # (and with it the gate) instead of quietly selecting no checks.
      - name: Test the path filter
        shell: bash
        run: bash scripts/ci-path-filter-test.sh

      - name: Detect required native checks
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "sprout-python=true" >> "$GITHUB_OUTPUT"
            echo "stem-go=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only \
            ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} \
            | bash scripts/ci-path-filter.sh >> "$GITHUB_OUTPUT"

  # Audits the Python Sprout's dependencies. Named for what it does: it runs no
  # tests, and "Tendril" is a concept in the reconciled taxonomy, not a thing
  # with a Python package. Safe to rename — only "Native PR Gate" and
  # "verify-commits" are required status checks.
  sprout-python:
    name: Sprout Dependency Audit (Python)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs['sprout-python'] == 'true' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies (hash-locked)
        run: |
          # Reproducible, integrity-checked install: --require-hashes fails if
          # any wheel's sha256 does not match requirements.lock. pip-audit is
          # installed separately so it is not subject to the lock's hash set.
          pip install --require-hashes -r sprouts/python/requirements.lock
          pip install pip-audit

      - name: Vulnerability Scan (pip-audit)
        run: |
          pip-audit -r sprouts/python/requirements.lock
          

  stem-go:
    name: Stem Tests (Go)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs['stem-go'] == 'true' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          # Must track a currently supported Go line: govulncheck findings in
          # the standard library are only fixed in supported patch releases,
          # so scanning with an EOL toolchain can never go green.
          go-version: '1.26.x'
          check-latest: true
          cache-dependency-path: go.sum

      # Blocking CVE gate for the Go kernel. Runs at the module
      # root so it covers the whole binary: cmd/stem AND roots/. govulncheck
      # only reports vulnerabilities reachable from this code, which keeps it
      # quiet enough to gate on. If a reachable CVE ever has to be waived to
      # unblock urgent work, do it with an explicit, dated continue-on-error
      # commit — never with `|| true`.
      #
      # govulncheck is a tool dependency in go.mod, not a `go install` of a
      # remote package. Installing it fetched the module on every run and
      # verified it against the checksum database, because a bare
      # `pkg@version` is not recorded in go.sum — one TLS timeout against
      # sum.golang.org and the required gate failed on an error that had
      # nothing to do with the change. As a tool dependency its hashes live in
      # go.sum (so no checksum-database round trip), the module cache keyed on
      # go.sum serves it, and the version is visible to dependency updates.
      # This mirrors the hash-locked install the Python audit job already uses.
      - name: Vulnerability Scan (govulncheck)
        run: go tool govulncheck ./...

      # Ask the module which directories are its own rather than naming them
      # here. The previous form scanned `cmd/stem roots` and filtered out
      # `cmd/stem/dist`: it missed cmd/sprout-agent entirely, and the directory
      # it excluded no longer exists. A declared list is fail-open the moment
      # the tree moves on without it. This is the same check the local verifier
      # runs, so both tiers agree on what "formatted" means.
      - name: gofmt Check
        shell: bash
        run: |
          set -euo pipefail
          package_dirs="$(go list -f '{{.Dir}}' ./...)"
          if [ -z "$package_dirs" ]; then
            echo "go list reported no packages to format."
            exit 1
          fi
          unformatted="$(gofmt -l $package_dirs)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      # ----- Firecracker terrarium test environment -----------------------
      #
      # The Firecracker provider tests gate themselves on
      # CheckFirecrackerReadiness: a firecracker binary in PATH, a bootstrapped
      # guest kernel + rootfs, and an accessible /dev/kvm. Without this setup
      # they skip here AND under the sealed local verifier — verified nowhere.
      # The steps below satisfy readiness so the tests self-enable and boot
      # real microVMs on the runner. No Docker is involved anywhere.
      #
      # ubuntu-latest exposes /dev/kvm, but the runner user is not in the kvm
      # group, so the device is unusable until this permissive udev rule
      # applies. A disposable single-tenant virtual machine has no other users
      # to protect the device from.
      - name: Enable KVM access for the runner user
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      # Pinned release, verified against the sha256 published alongside the
      # asset; sha256sum -c makes a mismatch fail the job before anything is
      # installed.
      - name: Install Firecracker
        shell: bash
        run: |
          set -euo pipefail
          version="v1.16.1"
          asset="firecracker-${version}-x86_64.tgz"
          base="https://github.com/firecracker-microvm/firecracker/releases/download/${version}"
          cd "$(mktemp -d)"
          curl -fsSL --retry 3 -O "${base}/${asset}"
          curl -fsSL --retry 3 -O "${base}/${asset}.sha256.txt"
          sha256sum -c "${asset}.sha256.txt"
          tar -xzf "${asset}"
          sudo install -m 0755 "release-${version}-x86_64/firecracker-${version}-x86_64" /usr/local/bin/firecracker
          firecracker --version

      # The cache keys ARE the pinned sha256 digests that init-firecracker
      # enforces, so a cache hit cannot serve different bytes than a fresh
      # verified download would — and the bootstrap re-hashes whatever it
      # finds on disk regardless.
      - name: Cache Firecracker guest artifacts
        uses: actions/cache@v4
        with:
          path: |
            .tendril/terrarium/vmlinux.bin
            .tendril/terrarium/busybox
          key: firecracker-guest-ea5e7d5cf494a8c4ba043259812fc018b44880d70bcbbfc4d57d2760631b1cd6-6e123e7f3202a8c1e9b1f94d8941580a25135382b99e8d3e34fb858bba311348

      # The same bootstrap a developer runs locally — CI is deliberately not
      # a special path, so both environments produce identical guests.
      - name: Bootstrap Firecracker kernel and rootfs
        shell: bash
        run: |
          set -euo pipefail
          go run ./cmd/stem terrarium init-firecracker
          echo "TENDRIL_FC_KERNEL_PATH=${PWD}/.tendril/terrarium/vmlinux.bin" >> "$GITHUB_ENV"
          echo "TENDRIL_FC_ROOTFS_PATH=${PWD}/.tendril/terrarium/rootfs.ext4" >> "$GITHUB_ENV"

      # Run the suite directly on the runner, NOT through `make test-stem`.
      #
      # That target wraps `go test` in a golang container for sterility, which
      # is the right trade on a developer's machine but wrong here: the
      # container has no Docker daemon, so every test that needs one gates
      # itself off and skips. The runner already provides Docker natively, and
      # the wrapper threw that away — the tier meant to cover the
      # daemon-dependent tests was the tier discarding the daemon. The runner
      # is a disposable virtual machine per job, so it is already as sterile as
      # the container was pretending to be.
      #
      # Tests here spawn containers as SIBLINGS on the runner's own daemon.
      # This is not Docker-out-of-Docker: no daemon socket is mounted into any
      # container, and nothing inside a container gains host reach. Handing the
      # socket to the compose service would have been the easy fix and is
      # exactly the escalation that is rejected permanently.
      # -v is not decoration: `go test` exits 0 when tests skip, so without the
      # per-test lines a skip is invisible here and the job's green says
      # nothing about whether anything ran. The local verifier parses -json and
      # treats a skip as not-green; this tier still judges on the exit code, so
      # the log is the only place a skip can surface. Keep it readable.
      - name: Run Stem Tests
        run: go test ./... -v

  # This job's NAME is a required status check in the "Protect Default"
  # ruleset. Renaming it makes the required context never report and leaves
  # every pull request unmergeable.
  pr:
    name: Native PR Gate
    runs-on: ubuntu-latest
    needs:
      - changes
      - sprout-python
      - stem-go
    if: ${{ always() }}
    steps:
      - name: Finalize Required Check
        shell: bash
        run: |
          failed=false

          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "Path filter failed."
            failed=true
          fi

          # require <job-name> <required-flag> <job-result>
          #
          # The flag must read exactly true or false. Anything else — an empty
          # string from a failed expression, a typo in an output name — means
          # this gate does not know whether the job was needed, and a gate that
          # does not know must not pass.
          require() {
            local job="$1" flag="$2" result="$3"

            case "$flag" in
              true)
                if [ "$result" != "success" ]; then
                  echo "${job} was required but finished with result: ${result}"
                  failed=true
                else
                  echo "${job}: ran and passed."
                fi
                ;;
              false)
                echo "${job}: not required by the changed paths."
                ;;
              *)
                echo "${job}: required-flag is ${flag:-<empty>}, expected true or false — failing closed."
                failed=true
                ;;
            esac
          }

          require "sprout-python" \
            "${{ needs.changes.outputs['sprout-python'] }}" \
            "${{ needs.sprout-python.result }}"

          require "stem-go" \
            "${{ needs.changes.outputs['stem-go'] }}" \
            "${{ needs.stem-go.result }}"

          if [ "$failed" = "true" ]; then
            exit 1
          fi

          # Deliberately not "all checks passed": when the changed paths need
          # nothing, this gate is green because nothing was applicable, which
          # is a different claim from having verified something.
          echo "Native PR gate satisfied."
