name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "**/*.md"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Path Filter
    runs-on: ubuntu-latest
    outputs:
      tendril-python: ${{ steps.filter.outputs['tendril-python'] }}
      stem-go: ${{ steps.filter.outputs['stem-go'] }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect required native checks
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "tendril-python=true" >> "$GITHUB_OUTPUT"
            echo "stem-go=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})"

          tendril_python=false
          stem_go=false

          while IFS= read -r path; do
            case "$path" in
              .github/workflows/ci.yml|Makefile)
                tendril_python=true
                stem_go=true
                ;;
              sprouts/python/src/*|sprouts/python/tests/*|sprouts/python/requirements.txt|sprouts/python/pyproject.toml)
                tendril_python=true
                ;;
              cmd/stem/*|cmd/stem/**|roots/*|roots/**|go.mod|go.sum)
                stem_go=true
                ;;
            esac
          done <<< "$changed_files"

          echo "tendril-python=$tendril_python" >> "$GITHUB_OUTPUT"
          echo "stem-go=$stem_go" >> "$GITHUB_OUTPUT"

  tendril-python:
    name: Tendril Tests (Python)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs['tendril-python'] == 'true' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install -r sprouts/python/requirements.txt pytest pip-audit
          
      - name: Vulnerability Scan (pip-audit)
        run: |
          pip-audit -r sprouts/python/requirements.txt
          

  stem-go:
    name: Stem Tests (Go)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs['stem-go'] == 'true' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache-dependency-path: go.sum
          
      # - name: Vulnerability Scan (govulncheck)
      #   run: |
      #     go install golang.org/x/vuln/cmd/govulncheck@latest
      #     cd cmd/stem
      #     govulncheck ./... || true

      - name: gofmt Check
        run: |
          unformatted=$(gofmt -l cmd/stem roots | grep -v '^cmd/stem/dist' || true)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run Stem Tests
        run: |
          make test-stem

  pr:
    name: Native PR Gate
    runs-on: ubuntu-latest
    needs:
      - changes
      - tendril-python
      - stem-go
    if: ${{ always() }}
    steps:
      - name: Finalize Required Check
        run: |
          failed=false

          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "Path filter failed."
            failed=true
          fi

          if [ "${{ needs.changes.outputs['tendril-python'] }}" = "true" ] && \
             [ "${{ needs.tendril-python.result }}" != "success" ]; then
            echo "tendril-python was required but finished with result: ${{ needs.tendril-python.result }}"
            failed=true
          fi

          if [ "${{ needs.changes.outputs['stem-go'] }}" = "true" ] && \
             [ "${{ needs.stem-go.result }}" != "success" ]; then
            echo "stem-go was required but finished with result: ${{ needs.stem-go.result }}"
            failed=true
          fi

          if [ "$failed" = "true" ]; then
            exit 1
          fi

          echo "All required CI jobs passed."
