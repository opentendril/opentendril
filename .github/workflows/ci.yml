name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "**/*.md"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Path Filter
    runs-on: ubuntu-latest
    outputs:
      python-core: ${{ steps.filter.outputs['python-core'] }}
      gateway-go: ${{ steps.filter.outputs['gateway-go'] }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect required native checks
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "python-core=true" >> "$GITHUB_OUTPUT"
            echo "cli-go=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})"

          python_core=false
          gateway_go=false

          while IFS= read -r path; do
            case "$path" in
              .github/workflows/ci.yml|Makefile)
                python_core=true
                gateway_go=true
                ;;
              src/*|tests/*|requirements.txt|pyproject.toml)
                python_core=true
                ;;
              cmd/tendril/*|cmd/tendril/**|go.mod|go.sum)
                gateway_go=true
                ;;
            esac
          done <<< "$changed_files"

          echo "python-core=$python_core" >> "$GITHUB_OUTPUT"
          echo "gateway-go=$gateway_go" >> "$GITHUB_OUTPUT"

  python_core:
    name: Core Orchestrator Tests (Python)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs['python-core'] == 'true' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt pytest pip-audit
          
      - name: Vulnerability Scan (pip-audit)
        run: |
          pip-audit -r requirements.txt
          
      - name: Run Core Tests
        run: |
          make test-core

  gateway_go:
    name: Gateway Tests (Go)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs['gateway-go'] == 'true' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          
      - name: Vulnerability Scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd cmd/tendril
          govulncheck ./...
          
      - name: Run Gateway Tests
        run: |
          make test-gateway

  pr:
    name: Native PR Gate
    runs-on: ubuntu-latest
    needs:
      - changes
      - python_core
      - gateway_go
    if: ${{ always() }}
    steps:
      - name: Finalize Required Check
        run: |
          failed=false

          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "Path filter failed."
            failed=true
          fi

          if [ "${{ needs.changes.outputs['python-core'] }}" = "true" ] && \
             [ "${{ needs.python_core.result }}" != "success" ]; then
            echo "python-core was required but finished with result: ${{ needs.python_core.result }}"
            failed=true
          fi

          if [ "${{ needs.changes.outputs['gateway-go'] }}" = "true" ] && \
             [ "${{ needs.gateway_go.result }}" != "success" ]; then
            echo "gateway-go was required but finished with result: ${{ needs.gateway_go.result }}"
            failed=true
          fi

          if [ "$failed" = "true" ]; then
            exit 1
          fi

          echo "All required CI jobs passed."
