name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "**/*.md"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Path Filter
    runs-on: ubuntu-latest
    outputs:
      tendril-python: ${{ steps.filter.outputs['tendril-python'] }}
      stem-go: ${{ steps.filter.outputs['stem-go'] }}
      tree-sitter: ${{ steps.filter.outputs['tree-sitter'] }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect required native checks
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "tendril-python=true" >> "$GITHUB_OUTPUT"
            echo "stem-go=true" >> "$GITHUB_OUTPUT"
            echo "tree-sitter=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})"

          tendril_python=false
          stem_go=false
          tree_sitter=false

          while IFS= read -r path; do
            case "$path" in
              .github/workflows/ci.yml|Makefile)
                tendril_python=true
                stem_go=true
                tree_sitter=true
                ;;
              sprouts/python/src/*|sprouts/python/tests/*|sprouts/python/requirements.txt|sprouts/python/pyproject.toml)
                tendril_python=true
                ;;
              cmd/stem/*|cmd/stem/**|roots/*|roots/**|go.mod|go.sum)
                stem_go=true
                ;;
            esac

            # Independent match so tree-sitter fidelity is checked whenever the
            # container parser, its fixtures, the golden test, or the golden
            # file changes. Kept as a second case so a conductor .go change can
            # set both stem-go (above) and tree-sitter (here).
            case "$path" in
              sprouts/tree-sitter/*|sprouts/tree-sitter/**|cmd/stem/internal/conductor/treesitter*.go|cmd/stem/internal/conductor/testdata/*|cmd/stem/internal/conductor/testdata/**)
                tree_sitter=true
                ;;
            esac
          done <<< "$changed_files"

          echo "tendril-python=$tendril_python" >> "$GITHUB_OUTPUT"
          echo "stem-go=$stem_go" >> "$GITHUB_OUTPUT"
          echo "tree-sitter=$tree_sitter" >> "$GITHUB_OUTPUT"

  tendril-python:
    name: Tendril Tests (Python)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs['tendril-python'] == 'true' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install -r sprouts/python/requirements.txt pytest pip-audit
          
      - name: Vulnerability Scan (pip-audit)
        run: |
          pip-audit -r sprouts/python/requirements.txt
          

  stem-go:
    name: Stem Tests (Go)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs['stem-go'] == 'true' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          # Must track a currently supported Go line: govulncheck findings in
          # the standard library are only fixed in supported patch releases,
          # so scanning with an EOL toolchain can never go green.
          go-version: '1.26.x'
          check-latest: true
          cache-dependency-path: go.sum

      # Blocking CVE gate for the Go kernel (issue #189). Runs at the module
      # root so it covers the whole binary: cmd/stem AND roots/. govulncheck
      # only reports vulnerabilities reachable from this code, which keeps it
      # quiet enough to gate on. If a reachable CVE ever has to be waived to
      # unblock urgent work, do it with an explicit, dated continue-on-error
      # commit — never with `|| true`.
      - name: Vulnerability Scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...

      - name: gofmt Check
        run: |
          unformatted=$(gofmt -l cmd/stem roots | grep -v '^cmd/stem/dist' || true)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run Stem Tests
        run: |
          make test-stem

  tree-sitter:
    name: Tree-Sitter Fidelity (Golden)
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs['tree-sitter'] == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true
          cache-dependency-path: go.sum

      # The fidelity logic lives in parse.js inside the container, so the
      # golden test must run against a freshly built image — never a stale
      # cached tag. This is the one job that builds a sprout image in CI.
      - name: Build tree-sitter image
        run: docker build -t opentendril-tree-sitter:latest sprouts/tree-sitter/

      # OTTS_REQUIRE_GOLDEN=1 makes the test fail (never skip) if docker or the
      # image is missing, so a green result here always means the fidelity was
      # actually checked against the golden fixture.
      - name: Run golden fidelity test
        env:
          OTTS_REQUIRE_GOLDEN: '1'
        run: |
          go test ./cmd/stem/internal/conductor/ -run TestTreeSitterGoldenFidelity -v

  pr:
    name: Native PR Gate
    runs-on: ubuntu-latest
    needs:
      - changes
      - tendril-python
      - stem-go
      - tree-sitter
    if: ${{ always() }}
    steps:
      - name: Finalize Required Check
        run: |
          failed=false

          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "Path filter failed."
            failed=true
          fi

          if [ "${{ needs.changes.outputs['tendril-python'] }}" = "true" ] && \
             [ "${{ needs.tendril-python.result }}" != "success" ]; then
            echo "tendril-python was required but finished with result: ${{ needs.tendril-python.result }}"
            failed=true
          fi

          if [ "${{ needs.changes.outputs['stem-go'] }}" = "true" ] && \
             [ "${{ needs.stem-go.result }}" != "success" ]; then
            echo "stem-go was required but finished with result: ${{ needs.stem-go.result }}"
            failed=true
          fi

          if [ "${{ needs.changes.outputs['tree-sitter'] }}" = "true" ] && \
             [ "${{ needs.tree-sitter.result }}" != "success" ]; then
            echo "tree-sitter was required but finished with result: ${{ needs.tree-sitter.result }}"
            failed=true
          fi

          if [ "$failed" = "true" ]; then
            exit 1
          fi

          echo "All required CI jobs passed."
