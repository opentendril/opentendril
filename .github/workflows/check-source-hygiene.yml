name: Source Hygiene

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  no-issue-refs:
    name: No GitHub refs in source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Repo files must be self-contained. This blocks a PR that ADDS a GitHub
      # issue/PR reference to source (comments, Dockerfiles, requirements, docs);
      # pre-existing references never fail it (the check is diff-based).
      - name: No new GitHub issue/PR references
        run: |
          # Full (not shallow) fetch of the base so the merge-base for the
          # diff resolves — a shallow base makes `base...HEAD` mis-report
          # pre-existing lines as added.
          git fetch --no-tags origin "${{ github.base_ref }}"
          bash scripts/check-no-issue-refs.sh "origin/${{ github.base_ref }}"

  no-default-branch-assumptions:
    name: No hard-coded default branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # A git execution path must RESOLVE the repository's default branch, never
      # assume its name. The rule was decided, documented, and then silently
      # violated anyway — so it is enforced here rather than remembered.
      - name: No new default-branch assumptions
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          bash scripts/check-default-branch-assumptions.sh "origin/${{ github.base_ref }}"

  delegated-workspace-isolation:
    name: Delegated ops stay isolated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Every delegated git operation must run in a per-Pollinator workspace. A new
      # operation that resolves the substrate's path itself looks reasonable in
      # review and silently reintroduces two Pollinators sharing one working tree.
      - name: Delegated git operations use the resolved workspace
        run: bash scripts/check-delegated-workspace-isolation.sh

  branch-deletion-guard:
    name: Branch deletion stays gated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Deleting a branch is the only thing the ladder does that destroys work,
      # and the obvious ways to decide "is this merged" (git branch --merged, a
      # diff comparison) both miss squash merges. This keeps deletion in one
      # place, gated on forge evidence.
      - name: Branch deletion is gated on merge evidence
        run: bash scripts/check-branch-deletion-guard.sh

  protected-paths:
    name: Protected paths have a code owner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # .github/protected-paths is the single definition of the kernel a Sprout
      # must not rewrite. The Stem enforces it at merge-back; GitHub enforces it
      # at review through CODEOWNERS. The second only works if every listed path
      # actually has an owner, and nothing stops one file being edited without
      # the other. This proves the projection is complete — it does not check
      # reviews, which GitHub does better.
      - name: CODEOWNERS covers every protected path
        run: bash scripts/check-protected-paths.sh

  taxonomy:
    name: Taxonomy is used inside the organism
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Every term in the OpenTendril taxonomy has ONE job. Standard IT phrasing
      # belongs only at the external boundary (the AGENTS.md filename, the
      # Meristem / intent-translation layer). Diff-based: pre-existing wording
      # never blocks a pull request, new drift always does.
      - name: No standard IT vocabulary added inside the organism
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          bash scripts/check-taxonomy.sh "origin/${{ github.base_ref }}"

      # The drift this guard exists for lived mostly in pull request
      # DESCRIPTIONS, which no diff-based check can see. The body is untrusted
      # input, so it travels through the environment and is never interpolated
      # into the shell.
      - name: No standard IT vocabulary in the pull request description
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf '%s' "$PR_BODY" > "${RUNNER_TEMP}/pr-body.md"
          bash scripts/check-taxonomy.sh --text "${RUNNER_TEMP}/pr-body.md"
