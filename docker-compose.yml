name: opentendril

services:
  ui:
    build: ui
    profiles: ["ui"]
    ports:
      - "${UI_BIND:-127.0.0.1}:${UI_PORT:-4173}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      STEM_HOST: ${STEM_HOST:-host.docker.internal}
      STEM_PORT: ${STEM_PORT:-8080}
      STEM_GATEWAY_PORT: ${STEM_GATEWAY_PORT:-9090}
      UI_BIND: ${UI_BIND:-127.0.0.1}
    read_only: true
    tmpfs:
      - /tmp
      - /etc/nginx/conf.d:uid=101,gid=101,mode=0755
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  test-go:
    image: golang:1.26
    profiles: ["test"]
    working_dir: /src
    volumes:
      - .:/src
    command: ["go", "test", "./...", "-v"]
