services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tendril_default_db_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-tendril_default_redis_secret}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-tendril_default_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  tendril:
    build: .
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
      - path: ./data/.env
        required: false
    environment:
      GROK_API_KEY: ${GROK_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      HF_TOKEN: ${HF_TOKEN:-}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tendril_default_db_secret}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-tendril_default_redis_secret}
      SECRET_KEY: ${SECRET_KEY:-tendril_default_jwt_secret}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-grok}
      LOCAL_INFERENCE_URL: ${LOCAL_INFERENCE_URL:-http://inference:8000/v1}
      LOCAL_MODEL_NAME: ${LOCAL_MODEL_NAME:-Qwen/Qwen3-8B-AWQ}
      TENDRIL_WORKSPACE_ROOT: ${TENDRIL_WORKSPACE_ROOT:-/app}
      SANDBOX_TOKEN: ${SANDBOX_TOKEN:-tendril_default_sandbox_token}
      SANDBOX_ENABLED: ${SANDBOX_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sandbox:
        condition: service_started
    networks:
      - default
      - sandbox_net
    volumes:
      # Default: Mount internal source code for the "Root Agent" Moat loop
      - ./src:/app/src
      - ./.git:/app/.git
      - ./skills:/app/skills
      - ./data:/app/data
      - ./logs:/app/logs
      - ./static:/app/static
      - ./tests:/app/tests
      - ./cli:/app/cli
      - ./gateway:/app/gateway
      - ./docs:/app/docs
      # External project mode: set TENDRIL_PROJECT_PATH in .env
      # When set, mounts the external repo at /workspace and Tendril edits that.
      # When unset, defaults to '.' (opentendril itself, self-building mode).
      - ${TENDRIL_PROJECT_PATH:-.}:/workspace
    restart: unless-stopped

  # Go Chat Gateway — WebSocket entry point for all channels
  gateway:
    build: ./gateway
    ports:
      - "9090:9090"
    environment:
      BRAIN_URL: http://tendril:8080
      GATEWAY_PORT: "9090"
    depends_on:
      - tendril
    restart: unless-stopped

  # Secure sandbox for code execution (no secrets, no DB, no internet)
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    environment:
      SANDBOX_TOKEN: ${SANDBOX_TOKEN:-tendril_default_sandbox_token}
    volumes:
      - ${TENDRIL_PROJECT_PATH:-.}:/workspace:ro
      - ./data:/sandbox-data
    networks:
      - sandbox_net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9999/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # GPU Inference (opt-in via Docker Profile)
  inference:
    image: vllm/vllm-openai:latest
    profiles: ["gpu"]
    ports:
      - "8000:8000"
    environment:
      NVIDIA_VISIBLE_DEVICES: "0"
    command: >
      --model ${LOCAL_MODEL_NAME:-Qwen/Qwen3-8B-AWQ}
      --quantization awq
      --max-model-len 8192
      --gpu-memory-utilization 0.85
      --host 0.0.0.0
      --port 8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
volumes:
  postgres_data:
  redis_data:

networks:
  sandbox_net:
    internal: true   # No outbound internet access
