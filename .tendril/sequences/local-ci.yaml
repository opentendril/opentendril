# local-ci: a governed local continuous-integration Sequence.
#
# Two deterministic verifier steps compile the module and run its test suite
# inside the toolchain verifier terrarium (opentendril-go-verifier). Each step
# carries an explicit `command`, so the Conductor execs it directly — no LLM,
# no code edits, no merge-back — and the command's exit code is the verdict.
# The workspace is mounted read-only and the host module cache is mounted
# read-only, so the run is offline and cannot mutate the substrate.
#
# The test step uses -short: the verifier runs under --network none, so tests
# that reach the network or a Docker daemon must gate on testing.Short().
#
# Run it (no model needed — deterministic):
#   tendril sequence run local-ci
#
# Note: the runner persists step status back into this file as it executes.
name: local-ci
substrate: ""
branch: ""
concurrencyLimit: 1
onFailure: halt
maxRetries: 0
steps:
  - id: verifier-build
    status: pending
    command: [go, build, ./...]
  - id: verifier-test
    status: pending
    dependsOn:
      - verifier-build
    command: [go, test, -short, ./...]
